<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="3">
<title>Lahav Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#090b10;color:#e8eaef;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{text-align:center;padding:40px}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:4px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.sub{color:#555a6e;font-size:0.85rem;margin-bottom:28px}
.spinner{width:36px;height:36px;border:3px solid #1f2437;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{color:#7d8296;font-size:0.78rem;margin-top:8px}
.err{color:#ef4444;font-size:0.85rem;display:none;margin-top:16px}
a{color:#3b82f6;font-size:0.8rem}
</style>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="box">
  <div class="logo">LAHAV</div>
  <div class="sub">דשבורד משפחת להב</div>
  <div class="spinner" id="sp"></div>
  <div class="status" id="st">מתחבר לשרת...</div>
  <div class="err" id="er">לא הצלחנו להתחבר. <a href="#" onclick="location.reload()">נסה שוב</a></div>
</div>
<script>
(function(){
  var raw = 'https://raw.githubusercontent.com/LahavRoee/lahav-dashboard/master/tunnel_url.txt';
  fetch(raw + '?t=' + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(url){
      url = url.trim();
      if(url && url.startsWith('http')){
        document.getElementById('st').textContent = 'מועבר לדשבורד...';
        window.location.replace(url);
      } else { throw new Error('bad url'); }
    })
    .catch(function(){
      document.getElementById('sp').style.display='none';
      document.getElementById('st').style.display='none';
      document.getElementById('er').style.display='block';
    });
})();
</script>
</body>
</html>
